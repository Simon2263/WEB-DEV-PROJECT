<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convention Traveler - Gallery Page</title>
<style>
  /* Reset and basic styling */
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body { 
    font-family: Arial, sans-serif; 
    line-height: 1.6; 
    background: #f5f5f5; 
    color: #333; 
  }

  a { text-decoration: none; color: inherit; }

  header {
    background: #1a1a1a;
    color: #fff;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  nav {
    display: flex;
    gap: 2rem;
  }

  nav a {
    position: relative;
  }

  nav a:hover { color: #ff6600; }

  nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 2px;
    background: #ff6600;
    transition: 0.3s;
  }

  nav a:hover::after {
    width: 100%;
  }

  main {
    padding: 4rem 1rem;
    max-width: 1200px;
    margin: auto;
  }

  h1, h2 { margin-bottom: 1rem; }

  h2 {
    font-size: 2rem;
    margin: 2rem 0 1rem 0;
    color: #1a1a1a;
  }

  /* Gallery grid */
  .grid {
    display: grid;
    gap: 1.5rem;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  .polaroid {
    background: #fff;
    padding: 1rem;
    border-radius: 6px;
    transform: rotate(-3deg);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
  }

  .polaroid img {
    width: 100%;
    height: auto;
    border-radius: 4px;
    display: block;
  }

  footer {
    background: #1a1a1a;
    color: #fff;
    text-align: center;
    padding: 2rem 1rem;
    margin-top: 2rem;
  }

  @media (max-width: 600px) {
    header {
      flex-direction: column;
      align-items: flex-start;
    }

    nav {
      margin-top: 0.5rem;
      flex-wrap: wrap;
    }

    .polaroid {
      transform: rotate(-1deg);
    }
  }
</style>
</head>
